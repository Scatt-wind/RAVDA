<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAVDA · 智能数据分析</title>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">📊</span>
          <div>
            <h1>RAVDA</h1>
            <p>智能数据分析与可视化助手</p>
          </div>
        </div>
        <div class="header-actions">
          <span id="health-badge" class="badge badge-muted">检查连接中…</span>
          <a class="text-link" href="/docs" target="_blank" rel="noopener">API 文档</a>
        </div>
      </header>

      <div class="app-body">
        <aside class="sidebar">
          <section class="panel">
            <h2>数据文件</h2>
            <label class="file-drop" for="file-input">
              <input id="file-input" type="file" accept=".csv,.xlsx,.xls" hidden />
              <span id="file-label">选择 CSV / Excel</span>
            </label>
            <button id="upload-btn" class="btn btn-primary" type="button" disabled>
              上传并分析
            </button>
            <p id="upload-message" class="hint" role="status"></p>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>最近上传</h2>
              <button id="refresh-datasets-btn" class="btn btn-ghost btn-sm" type="button">
                刷新
              </button>
            </div>
            <div id="dataset-list" class="dataset-list"></div>
          </section>

          <section id="current-dataset-panel" class="panel hidden">
            <h2>当前数据集</h2>
            <div class="metric-grid">
              <div class="metric">
                <span class="metric-label">行数</span>
                <span id="metric-rows" class="metric-value">—</span>
              </div>
              <div class="metric">
                <span class="metric-label">列数</span>
                <span id="metric-cols" class="metric-value">—</span>
              </div>
            </div>
            <p id="metric-filename" class="dataset-name"></p>
            <div class="id-row">
              <code id="dataset-id" class="dataset-id"></code>
              <button id="copy-id-btn" class="btn btn-ghost btn-sm" type="button">复制 ID</button>
            </div>
            <p class="hint">Agent 会通过系统提示词记住 dataset_id；切换数据集后请在对话中说明新文件。</p>
            <div class="rag-row">
              <span id="rag-badge" class="badge badge-muted">RAG 未知</span>
              <button id="refresh-rag-btn" class="btn btn-ghost btn-sm" type="button">刷新</button>
              <button id="reindex-rag-btn" class="btn btn-ghost btn-sm" type="button">重新索引</button>
            </div>
          </section>
        </aside>

        <main class="main-area">
          <section class="chat-panel">
            <div class="panel-head">
              <h2>Agent 对话</h2>
              <p class="hint">在下方与 Dify Agent 交流；分析执行由 RAVDA 后端完成。</p>
            </div>
            <div id="iframe-shell" class="iframe-shell">
              <div id="iframe-loading" class="iframe-loading">正在加载 Agent…</div>
              <iframe
                id="dify-iframe"
                title="RAVDA Dify Agent"
                allow="microphone"
                loading="lazy"
              ></iframe>
            </div>
            <p id="iframe-error" class="error-text hidden"></p>
          </section>

          <section class="results-panel">
            <div class="panel-head">
              <h2>分析结果</h2>
              <span id="results-meta" class="hint"></span>
            </div>
            <div id="results-empty" class="empty-state">
              选择数据集并在 Agent 中提问后，表格与图表将显示在这里。
            </div>
            <div id="results-content" class="results-content hidden">
              <p id="turn-question" class="turn-question"></p>
              <div id="turn-summary" class="turn-summary"></div>
              <p id="turn-error" class="error-text hidden"></p>
              <div id="turn-table-wrap" class="table-wrap hidden">
                <table id="turn-table"></table>
              </div>
              <div id="turn-charts" class="chart-grid"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
